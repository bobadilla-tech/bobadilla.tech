<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="5" y="5" width="50" height="50" rx="12" fill="url(#iconGradient)" opacity="0.1"/>

  <!-- BT Letters -->
  <text x="30" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="url(#iconGradient)" text-anchor="middle">BT</text>
</svg>
