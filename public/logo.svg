<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- BT Monogram -->
  <text x="10" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="url(#logoGradient)">BT</text>

  <!-- Bobadilla Tech Text -->
  <text x="90" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#logoGradient)">Bobadilla</text>
  <text x="90" y="53" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">Tech</text>
</svg>
